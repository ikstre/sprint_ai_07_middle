# ============================================================
# AutoRAG - CSV 기반 평가 설정 (data/autorag_csv 전용)
#
# 기존 local.yaml 대비 개선 사항:
#   1. 데이터: data_list_cleaned.csv 기반 corpus/qa (retrieval_gt 정확, generation_gt 실제 텍스트)
#   2. 프롬프트: RFP 도메인에 최적화된 3종 비교 (baseline / structured / concise)
#   3. top_k: 664개 corpus에 맞게 최적화 (최대 16)
#   4. prompt_maker max_tokens: 256 → 512 (사업 요약 평균 260자)
#
# 실행 명령어:
#   python scripts/prepare_autorag_from_csv.py --output-dir data/autorag_csv
#
#   PYTHONNOUSERSITE=1 python scripts/run_autorag_optimization.py \
#     --qa-path data/autorag_csv/qa.parquet \
#     --corpus-path data/autorag_csv/corpus.parquet \
#     --config-path configs/autorag/local_csv.yaml \
#     --project-dir evaluation/autorag_benchmark_csv
# ============================================================

# ── 벡터DB: 로컬 임베딩 모델 5종 비교 ──────────────────────────────────────
vectordb:
  - name: local_bge
    db_type: chroma
    embedding_model:
      type: huggingface
      model_name: /srv/shared_data/models/embeddings/BGE-m3-ko
    collection_name: autorag_csv_bge
    client_type: persistent
    path: ${PROJECT_DIR}/resources/chroma
    similarity_metric: cosine
    embedding_batch: 50

  - name: local_sroberta
    db_type: chroma
    embedding_model:
      type: huggingface
      model_name: /srv/shared_data/models/embeddings/ko-sroberta-multitask
    collection_name: autorag_csv_sroberta
    client_type: persistent
    path: ${PROJECT_DIR}/resources/chroma
    similarity_metric: cosine
    embedding_batch: 50

  - name: local_e5_large
    db_type: chroma
    embedding_model:
      type: huggingface
      model_name: /srv/shared_data/models/embeddings/multilingual-e5-large
    collection_name: autorag_csv_e5_large
    client_type: persistent
    path: ${PROJECT_DIR}/resources/chroma
    similarity_metric: cosine
    embedding_batch: 32

  - name: local_kosimcse
    db_type: chroma
    embedding_model:
      type: huggingface
      model_name: /srv/shared_data/models/embeddings/KoSimCSE-roberta-multitask
    collection_name: autorag_csv_kosimcse
    client_type: persistent
    path: ${PROJECT_DIR}/resources/chroma
    similarity_metric: cosine
    embedding_batch: 50

  - name: local_kf_deberta
    db_type: chroma
    embedding_model:
      type: huggingface
      model_name: /srv/shared_data/models/embeddings/kf-deberta-multitask
    collection_name: autorag_csv_kf_deberta
    client_type: persistent
    path: ${PROJECT_DIR}/resources/chroma
    similarity_metric: cosine
    embedding_batch: 50

node_lines:
  - node_line_name: retrieve_node_line
    nodes:
      - node_type: lexical_retrieval
        strategy:
          metrics: [retrieval_f1, retrieval_ndcg, retrieval_map]
          top_k: 16
        modules:
          - module_type: bm25
            # corpus 664개 기준: top_k 16이면 충분
            top_k: [1, 2, 4, 8, 16]

      - node_type: semantic_retrieval
        strategy:
          metrics: [retrieval_f1, retrieval_ndcg, retrieval_map]
          top_k: 16
        modules:
          - module_type: vectordb
            vectordb: local_bge
            top_k: [1, 2, 4, 8, 16]
          - module_type: vectordb
            vectordb: local_sroberta
            top_k: [1, 2, 4, 8, 16]
          - module_type: vectordb
            vectordb: local_e5_large
            top_k: [1, 2, 4, 8, 16]
          - module_type: vectordb
            vectordb: local_kosimcse
            top_k: [1, 2, 4, 8, 16]
          - module_type: vectordb
            vectordb: local_kf_deberta
            top_k: [1, 2, 4, 8, 16]

      - node_type: hybrid_retrieval
        strategy:
          metrics: [retrieval_f1, retrieval_ndcg, retrieval_map]
          top_k: 16
        modules:
          - module_type: hybrid_rrf
            top_k: [2, 4, 8, 16]
          - module_type: hybrid_cc
            top_k: [2, 4, 8, 16]
            normalize_method: [mm, tmm]

  - node_line_name: post_retrieve_node_line
    nodes:
      - node_type: prompt_maker
        strategy:
          metrics:
            - metric_name: meteor
            - metric_name: rouge
          generator_modules:
            # prompt_maker 평가용: EXAONE-4.0-1.2B (빠름)
            # max_tokens=512: generation_gt 최대 ~240토큰 기준 2배 여유
            # vLLM에서 max_tokens는 출력 예약분 → 줄일수록 입력 공간 증가
            - module_type: vllm
              llm: /srv/shared_data/models/exaone/EXAONE-4.0-1.2B
              max_tokens: 512
              temperature: 0.1
              gpu_memory_utilization: 0.70
              kv_cache_dtype: auto
              trust_remote_code: true
        modules:
          # ── 프롬프트 3종 비교 ────────────────────────────────────────
          # P1: Baseline — 단순 지시
          - module_type: fstring
            prompt:
              - |
                다음 문서를 참고하여 질문에 한국어로 답변하세요.
                질문: {query}
                참고 문서: {retrieved_contents}
                답변:

              # P2: Structured — RFP 도메인 구조 명시
              - |
                아래는 공공/기업 입찰 제안요청서(RFP) 문서입니다.
                문서 내용을 바탕으로 사업 목적, 범위, 기대효과를 중심으로 질문에 한국어로 답변하세요.
                질문: {query}
                참고 문서: {retrieved_contents}
                답변:

              # P3: Concise — 핵심만 간결하게
              - |
                다음 RFP 문서를 참고하여 질문에 간결하고 정확하게 한국어로 답변하세요.
                불필요한 내용 없이 핵심 사항만 요약하세요.
                질문: {query}
                참고 문서: {retrieved_contents}
                답변:

      - node_type: generator
        strategy:
          metrics:
            - metric_name: meteor
            - metric_name: rouge
        modules:
          # max_tokens: [256, 512, 1024] — 출력 예약 토큰 비교
          #   256: 짧고 빠른 응답 (입력 공간 최대화)
          #   512: 사업 요약 최대값(~240토큰)의 2배 여유 (권장)
          #  1024: 장문 응답이 유리한지 비교 (입력 공간 다소 감소)
          # vLLM: max_model_len = 입력 + max_tokens → 값이 작을수록 입력 여유 증가

          # ── EXAONE-4.0-1.2B (2.4G) ───────────────────────────────────
          - module_type: vllm
            llm: /srv/shared_data/models/exaone/EXAONE-4.0-1.2B
            max_tokens: [256, 512, 1024]
            temperature: [0.1, 0.2]
            top_p: [0.85, 0.95]
            gpu_memory_utilization: 0.70
            kv_cache_dtype: auto
            trust_remote_code: true

          # ── kanana-nano-2.1b (4.0G) ──────────────────────────────────
          - module_type: vllm
            llm: /srv/shared_data/models/kanana/kanana-nano-2.1b
            max_tokens: [256, 512, 1024]
            temperature: [0.1, 0.2]
            top_p: [0.85, 0.95]
            gpu_memory_utilization: 0.70
            kv_cache_dtype: auto

          # ── kanana-1.5-2.1b (4.4G) ───────────────────────────────────
          - module_type: vllm
            llm: /srv/shared_data/models/kanana/kanana-1.5-2.1b
            max_tokens: [256, 512, 1024]
            temperature: [0.1, 0.2]
            top_p: [0.85, 0.95]
            gpu_memory_utilization: 0.70
            kv_cache_dtype: auto

          # ── Midm-2.0-Mini (4.4G) ─────────────────────────────────────
          - module_type: vllm
            llm: /srv/shared_data/models/midm/Midm-2.0-Mini
            max_tokens: [256, 512, 1024]
            temperature: [0.7, 0.8]
            top_k: 20
            top_p: [0.80, 0.90]
            gpu_memory_utilization: 0.70
            kv_cache_dtype: auto

          # ── Gemma3-4B (8.1G) ─────────────────────────────────────────
          - module_type: vllm
            llm: /srv/shared_data/models/gemma/Gemma3-4B
            max_tokens: [256, 512, 1024]
            temperature: [0.9, 1.0]
            top_k: 64
            top_p: [0.90, 0.95]
            gpu_memory_utilization: 0.70
            max_model_len: 16384
            kv_cache_dtype: auto
