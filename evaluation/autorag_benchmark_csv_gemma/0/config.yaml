vectordb:
- name: local_bge
  db_type: chroma
  embedding_model:
    type: huggingface
    model_name: /home/potaeto/sprint_ai_07_middle/shared_data/models/embeddings/BGE-m3-ko
  collection_name: autorag_csv_bge
  client_type: persistent
  path: ${PROJECT_DIR}/resources/chroma
  similarity_metric: cosine
  embedding_batch: 50
- name: local_sroberta
  db_type: chroma
  embedding_model:
    type: huggingface
    model_name: /home/potaeto/sprint_ai_07_middle/shared_data/models/embeddings/ko-sroberta-multitask
  collection_name: autorag_csv_sroberta
  client_type: persistent
  path: ${PROJECT_DIR}/resources/chroma
  similarity_metric: cosine
  embedding_batch: 50
- name: local_e5_large
  db_type: chroma
  embedding_model:
    type: huggingface
    model_name: /home/potaeto/sprint_ai_07_middle/shared_data/models/embeddings/multilingual-e5-large
  collection_name: autorag_csv_e5_large
  client_type: persistent
  path: ${PROJECT_DIR}/resources/chroma
  similarity_metric: cosine
  embedding_batch: 32
- name: local_kosimcse
  db_type: chroma
  embedding_model:
    type: huggingface
    model_name: /home/potaeto/sprint_ai_07_middle/shared_data/models/embeddings/KoSimCSE-roberta-multitask
  collection_name: autorag_csv_kosimcse
  client_type: persistent
  path: ${PROJECT_DIR}/resources/chroma
  similarity_metric: cosine
  embedding_batch: 50
- name: local_kf_deberta
  db_type: chroma
  embedding_model:
    type: huggingface
    model_name: /home/potaeto/sprint_ai_07_middle/shared_data/models/embeddings/kf-deberta-multitask
  collection_name: autorag_csv_kf_deberta
  client_type: persistent
  path: ${PROJECT_DIR}/resources/chroma
  similarity_metric: cosine
  embedding_batch: 50
node_lines:
- node_line_name: retrieve_node_line
  nodes:
  - node_type: lexical_retrieval
    strategy:
      metrics:
      - retrieval_f1
      - retrieval_ndcg
      - retrieval_map
      top_k: 16
    modules:
    - module_type: bm25
      bm25_tokenizer: porter_stemmer
      top_k:
      - 1
      - 2
      - 4
      - 8
      - 16
    - module_type: bm25
      bm25_tokenizer: ko_kiwi
      top_k:
      - 1
      - 2
      - 4
      - 8
      - 16
    - module_type: bm25
      bm25_tokenizer: ko_okt
      top_k:
      - 1
      - 2
      - 4
      - 8
      - 16
  - node_type: semantic_retrieval
    strategy:
      metrics:
      - retrieval_f1
      - retrieval_ndcg
      - retrieval_map
      top_k: 16
    modules:
    - module_type: vectordb
      vectordb: local_bge
      top_k:
      - 1
      - 2
      - 4
      - 8
      - 16
    - module_type: vectordb
      vectordb: local_sroberta
      top_k:
      - 1
      - 2
      - 4
      - 8
      - 16
    - module_type: vectordb
      vectordb: local_e5_large
      top_k:
      - 1
      - 2
      - 4
      - 8
      - 16
    - module_type: vectordb
      vectordb: local_kosimcse
      top_k:
      - 1
      - 2
      - 4
      - 8
      - 16
    - module_type: vectordb
      vectordb: local_kf_deberta
      top_k:
      - 1
      - 2
      - 4
      - 8
      - 16
  - node_type: hybrid_retrieval
    strategy:
      metrics:
      - retrieval_f1
      - retrieval_ndcg
      - retrieval_map
      top_k: 16
    modules:
    - module_type: hybrid_rrf
      top_k:
      - 2
      - 4
      - 8
      - 16
    - module_type: hybrid_cc
      top_k:
      - 2
      - 4
      - 8
      - 16
      normalize_method:
      - mm
      - tmm
- node_line_name: post_retrieve_node_line
  nodes:
  - node_type: prompt_maker
    strategy:
      metrics:
      - metric_name: meteor
      - metric_name: rouge
      generator_modules:
      - module_type: vllm
        llm: /home/potaeto/sprint_ai_07_middle/shared_data/models/exaone/EXAONE-4.0-1.2B
        max_tokens: 512
        temperature: 0.1
        gpu_memory_utilization: 0.7
        kv_cache_dtype: auto
        trust_remote_code: true
    modules:
    - module_type: fstring
      prompt:
      - '다음 문서를 참고하여 질문에 한국어로 답변하세요.

        질문: {query}

        참고 문서: {retrieved_contents}

        답변:

        '
      - '아래는 공공/기업 입찰 제안요청서(RFP) 문서입니다.

        문서 내용을 바탕으로 사업 목적, 범위, 기대효과를 중심으로 질문에 한국어로 답변하세요.

        질문: {query}

        참고 문서: {retrieved_contents}

        답변:

        '
      - '다음 RFP 문서를 참고하여 질문에 간결하고 정확하게 한국어로 답변하세요.

        불필요한 내용 없이 핵심 사항만 요약하세요.

        질문: {query}

        참고 문서: {retrieved_contents}

        답변:

        '
      - '당신은 ''입찰메이트''의 RFP 분석 AI 어시스턴트입니다.

        항상 검색된 문서 근거를 우선으로 답변하고, 문서에 없는 내용은 추측하지 마세요.

        핵심 요구사항/기관/예산/제출방식/일정 중심으로 간결하게 답변하세요.


        아래 컨텍스트를 근거로 질문에 답변하세요.


        [컨텍스트]

        {retrieved_contents}


        [질문]

        {query}


        [답변 작성 규칙]

        - 문서 근거 기반으로만 답변

        - 비교 질문이면 항목별 표 또는 목록

        - 근거가 없으면 "문서에서 확인되지 않음"이라고 명시

        답변:

        '
      - '당신은 10년 경력의 공공입찰 제안서 전문가입니다.

        아래 RFP 문서를 분석하여 질문에 정확하고 전문적으로 한국어로 답변하세요.

        사업명, 발주기관, 예산, 수행기간, 핵심 요구사항을 우선적으로 파악하세요.


        [RFP 문서]

        {retrieved_contents}


        [질문]

        {query}


        답변:

        '
      - '다음 RFP 문서에서 아래 항목을 중심으로 질문에 답변하세요.

        추출 항목: 사업명 | 발주기관 | 사업 목적 | 주요 요구사항 | 예산 | 수행기간


        [문서]

        {retrieved_contents}


        [질문]

        {query}


        위 항목 중 질문과 관련된 내용만 간결하게 정리하여 답변하세요.

        문서에 없는 항목은 생략하세요.

        답변:

        '
      - '다음 RFP 문서를 바탕으로 질문에 단계적으로 답변하세요.


        1단계: 질문의 핵심 의도를 파악하세요.

        2단계: 문서에서 관련 내용을 찾으세요.

        3단계: 근거를 바탕으로 명확하게 답변하세요.


        [문서]

        {retrieved_contents}


        [질문]

        {query}


        답변:

        '
  - node_type: generator
    strategy:
      metrics:
      - metric_name: meteor
      - metric_name: rouge
    modules:
    - module_type: vllm
      llm: /home/potaeto/sprint_ai_07_middle/models/finetuned/gemma4/final
      max_tokens:
      - 256
      - 512
      - 1024
      gpu_memory_utilization: 0.9
      kv_cache_dtype: auto
      temperature:
      - 0.9
      - 1.0
      top_k: 64
      top_p:
      - 0.9
      - 0.95
      max_model_len: 8192
