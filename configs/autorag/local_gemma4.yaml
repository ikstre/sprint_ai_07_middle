# ============================================================
# AutoRAG - Gemma4-E4B 전용 (별도 실행용)
#
# 모델: ${SRV_DATA_DIR}/models/gemma/Gemma4-E4B
#   - Gemma 4 4B dense 모델 (multimodal: vision + audio + text)
#   - BF16 (~15GB), MoE 없음 (enable_moe_block: false)
#   - max_position_embeddings: 131072
#   - transformers 5.x 필요 (user-local ~/.local 우선 로드)
#
# 실행:
#   bash scripts/run_gemma4_optimization.sh
#
# 실행 후 메인 결과와 합치기:
#   python scripts/merge_gemma4_results.py \
#     --main-dir evaluation/autorag_benchmark_local \
#     --gemma4-dir evaluation/autorag_benchmark_gemma4
#
# [메모리 계산]
#   모델: ~15GB BF16
#   gpu_memory_utilization: 0.85 → L4 23GB × 0.85 ≈ 19.6GB
#   KV 캐시 여유: ~4.6GB → max_model_len: 16384 (8192 → 확장, 프롬프트 8K+ 대응)
# ============================================================

# ── 벡터DB: 로컬 임베딩 모델 5종 비교 ──────────────────────────────────────
# run_autorag_optimization.py Patch 4가 각 vectordb ingestion 완료 직후
# embedding 모델을 해제(vectordb.embedding = None + cuda.empty_cache)하므로
# generator 단계에 진입할 때 임베딩 VRAM이 남아있지 않음.
vectordb:
  - name: local_bge
    db_type: chroma
    embedding_model:
      type: huggingface
      model_name: ${SRV_DATA_DIR}/models/embeddings/BGE-m3-ko
    collection_name: autorag_gemma4_bge
    client_type: persistent
    path: ${PROJECT_DIR}/resources/chroma
    similarity_metric: cosine
    embedding_batch: 50

  - name: local_sroberta
    db_type: chroma
    embedding_model:
      type: huggingface
      model_name: ${SRV_DATA_DIR}/models/embeddings/ko-sroberta-multitask
    collection_name: autorag_gemma4_sroberta
    client_type: persistent
    path: ${PROJECT_DIR}/resources/chroma
    similarity_metric: cosine
    embedding_batch: 50

  - name: local_e5_large
    db_type: chroma
    embedding_model:
      type: huggingface
      model_name: ${SRV_DATA_DIR}/models/embeddings/multilingual-e5-large
    collection_name: autorag_gemma4_e5_large
    client_type: persistent
    path: ${PROJECT_DIR}/resources/chroma
    similarity_metric: cosine
    embedding_batch: 32

  - name: local_kosimcse
    db_type: chroma
    embedding_model:
      type: huggingface
      model_name: ${SRV_DATA_DIR}/models/embeddings/KoSimCSE-roberta-multitask
    collection_name: autorag_gemma4_kosimcse
    client_type: persistent
    path: ${PROJECT_DIR}/resources/chroma
    similarity_metric: cosine
    embedding_batch: 50

  - name: local_kf_deberta
    db_type: chroma
    embedding_model:
      type: huggingface
      model_name: ${SRV_DATA_DIR}/models/embeddings/kf-deberta-multitask
    collection_name: autorag_gemma4_kf_deberta
    client_type: persistent
    path: ${PROJECT_DIR}/resources/chroma
    similarity_metric: cosine
    embedding_batch: 50

node_lines:
  - node_line_name: retrieve_node_line
    nodes:
      - node_type: lexical_retrieval
        strategy:
          metrics: [retrieval_f1, retrieval_ndcg, retrieval_map]
          top_k: 32
        modules:
          - module_type: bm25
            top_k: [2, 4, 8, 16, 32]

      - node_type: semantic_retrieval
        strategy:
          metrics: [retrieval_f1, retrieval_ndcg, retrieval_map]
          top_k: 32
        modules:
          - module_type: vectordb
            vectordb: local_bge
            top_k: [2, 4, 8, 16, 32]
          - module_type: vectordb
            vectordb: local_sroberta
            top_k: [2, 4, 8, 16, 32]
          - module_type: vectordb
            vectordb: local_e5_large
            top_k: [2, 4, 8, 16, 32]
          - module_type: vectordb
            vectordb: local_kosimcse
            top_k: [2, 4, 8, 16, 32]
          - module_type: vectordb
            vectordb: local_kf_deberta
            top_k: [2, 4, 8, 16, 32]

      - node_type: hybrid_retrieval
        strategy:
          metrics: [retrieval_f1, retrieval_ndcg, retrieval_map]
          top_k: 32
        modules:
          - module_type: hybrid_rrf
            top_k: [2, 4, 8, 16, 32]
          - module_type: hybrid_cc
            top_k: [2, 4, 8, 16, 32]
            normalize_method: [mm, tmm]

  - node_line_name: post_retrieve_node_line
    nodes:
      - node_type: prompt_maker
        strategy:
          metrics:
            - metric_name: meteor
            - metric_name: rouge
          generator_modules:
            - module_type: vllm
              llm: ${SRV_DATA_DIR}/models/gemma/Gemma4-E4B
              max_tokens: 512
              temperature: 1.0
              top_k: 64
              top_p: 0.95
              gpu_memory_utilization: 0.85
              max_model_len: 16384
              kv_cache_dtype: auto
        modules:
          - module_type: fstring
            prompt:
              - |
                다음 문서를 참고하여 질문에 한국어로 답변하세요.
                질문: {query}
                참고 문서: {retrieved_contents}
                답변:
              - |
                다음 문서를 참고하여 질문에 한국어로 간결하게 답변하세요.
                핵심 요구사항과 조건을 중심으로 작성하세요.
                질문: {query}
                참고 문서: {retrieved_contents}
                답변:

      - node_type: generator
        strategy:
          metrics:
            - metric_name: meteor
            - metric_name: rouge
        modules:
          # ── Gemma4-E4B (~15GB BF16) ───────────────────────────────────
          # dense 모델 (MoE 없음), multimodal (vision+audio+text)
          # temperature: 1.0, top_k: 64, top_p: 0.95 (Google 공식)
          - module_type: vllm
            llm: ${SRV_DATA_DIR}/models/gemma/Gemma4-E4B
            max_tokens: 512
            temperature: [0.9, 1.0]
            top_k: 64
            top_p: [0.90, 0.95]
            gpu_memory_utilization: 0.85
            max_model_len: 16384
            kv_cache_dtype: auto
