node_lines:
  - node_line_name: retrieve_node_line
    nodes:
      - node_type: retrieval
        strategy:
          metrics: [retrieval_f1, retrieval_ndcg, retrieval_map]
          top_k: 5
        modules:
          - module_type: bm25
          - module_type: vectordb
            vectordb: default
          - module_type: hybrid_rrf
          - module_type: hybrid_cc
            normalize_method: [mm, tmm]

  - node_line_name: post_retrieve_node_line
    nodes:
      - node_type: prompt_maker
        strategy:
          metrics:
            - metric_name: meteor
            - metric_name: rouge
            - metric_name: sem_score
          embedding_model: openai
        modules:
          - module_type: fstring
            prompt:
              - |
                Read the passages and answer the question in Korean.
                Question: {query}
                Passage: {retrieved_contents}
                Answer:
              - |
                Read the passages and answer the question in Korean.
                Be concise and cite key constraints.
                Question: {query}
                Passage: {retrieved_contents}
                Answer:

      - node_type: generator
        strategy:
          metrics:
            - metric_name: meteor
            - metric_name: rouge
            - metric_name: sem_score
          embedding_model: openai
        modules:
          - module_type: openai_llm
            llm: gpt-5-mini
            temperature: [0.0, 0.2]
            batch: 16
